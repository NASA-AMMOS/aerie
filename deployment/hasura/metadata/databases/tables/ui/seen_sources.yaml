table:
  name: seen_sources
  schema: ui
configuration:
  custom_name: "seen_sources"
object_relationships:
  - name: plan_derivation_group
    using:
      foreign_key_constraint_on:
        - plan_id
        - derivation_group_name
select_permissions:
  - role: aerie_admin
    permission:
      columns: '*'
      filter: {}
      allow_aggregations: true
  - role: user
    permission:
      columns: '*'
      filter: {}
      allow_aggregations: true
  - role: viewer
    permission:
      columns: '*'
      filter: {}
      allow_aggregations: true
insert_permissions:
  - role: aerie_admin
    permission:
      columns: '*'
      check: {}
update_permissions:
  - role: aerie_admin
    permission:
      columns: [last_acknowledged_at]
      filter: {}
  - role: user
    permission:
      columns: [last_acknowledged_at]
      filter: {
        "plan_derivation_group": {
          "plan":{
            "_or":[
              {
                "owner":{"_eq":"X-Hasura-User-Id" }
              },
              {
                "collaborators":{"collaborator":{"_eq":"X-Hasura-User-Id"}}
              }
            ]
          }
        }
      }
delete_permissions:
  - role: aerie_admin
    permission:
      filter: {}
